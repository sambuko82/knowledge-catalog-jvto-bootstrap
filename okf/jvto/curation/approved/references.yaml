      # Reference

      A historical Booking.com guest-review award artifact names "Ijen Bondowoso
      Home Stay" and displays a 9.4/10 score. A separate shipping label addresses
      the award to Agung at Jl. Khairil Anwar No.102, Bondowoso. Both are JVTO-hosted
      images (reachable 2026-06-25).

      # Claim Boundary

      This is a historical award artifact only. It is not a current rating, a current
      Booking.com listing, or an active partnership, and the shipping label is not by
      itself proof of legal continuity or succession.

