- id: references/booking-com-guest-review-award-2015
  type: Reference
  title: Booking.com Guest Review Award 2015
  description: A historical Booking.com Guest Review Award artifact names "Ijen Bondowoso Home Stay" with
    a 9.4/10 score.
  tags:
  - reference
  - booking-com
  - award-2015
  - history
  - ijen-bondowoso-homestay
  timestamp: '2026-06-25T00:00:00+07:00'
  status: qualified
  visibility: public
  last_verified: '2026-06-26'
  reference_kind: historical-award-artifact
  body: '# Reference


    A historical Booking.com 2015 Guest Review Award artifact names the

    "Ijen Bondowoso Home Stay" and displays a 9.4/10 score. The award shipment was

    addressed to Agung at Jl. Khairil Anwar No.102, Bondowoso. JVTO''s current office

    uses No.102A on the same address line. This provides historical address context

    only and does not establish legal succession.


    # Claim Boundary


    This is a historical award artifact only.

    It is not a current Booking.com rating, an active listing, or a current

    partnership, and the shipping label is not standalone legal-continuity proof.


    # Related Concepts


    - [Java Volcano Tour Operator (JVTO)](/organization.md)

    '
