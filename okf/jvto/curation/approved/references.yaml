      # Reference

      BBKSDA Jawa Timur documented training for guides affiliated with HPWKI from
      20 to 22 May 2024 at TWA Kawah Ijen. The report describes training on
      conservation, local-guide responsibilities, Search and Rescue, and emergency
      first aid (Penanggulangan Penderita Gawat Darurat).

      # Claim Boundary

      This source supports HPWKI training context. It does not establish that JVTO
      was directly certified by BBKSDA, that a specific JVTO employee attended, or
      that every JVTO guide completed the training.

