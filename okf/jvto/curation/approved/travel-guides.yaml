- id: travel-guides/packing-and-fitness
  type: Travel Guide
  title: Packing & Fitness
  description: What to bring and the fitness each destination needs — warm layers for cold pre-dawn starts,
    grippy footwear for volcanic and canyon terrain, and waterproofing where you get wet.
  tags:
  - travel-guide
  - packing
  - fitness
  - preparation
  timestamp: '2026-06-23T00:00:00+07:00'
  status: reviewed
  visibility: public
  last_verified: '2026-06-23'
  body: '# Overview


    Preparation comes down to three things: layering for cold pre-dawn starts

    (viewpoints can sit around 5–15°C), good grip for volcanic sand and canyon

    steps, and waterproofing where you will get wet. Fitness needs vary by

    destination — Mount Bromo suits most fitness levels, while the Ijen crater

    hike and canyon descents are more demanding. JVTO provides gas masks and

    trekking poles on Ijen.


    # Related Concepts


    - [Kawah Ijen](/destinations/kawah-ijen.md)

    - [Mount Bromo](/destinations/mount-bromo.md)

    '
  source_refs:
  - source_id: SRC-OPS-FACTS
    repo: sambuko82/llm-wiki
    path: wiki/website/operational-facts.md
    source_class: operational_direct
    captured_at: '2026-05-26'
- id: travel-guides/safety-on-tours
  type: Travel Guide
  title: Safety on Tours
  description: How JVTO makes safety decisions — a written framework with pre-hike briefings, trained
    guides, proper equipment, and contingency procedures.
  tags:
  - travel-guide
  - safety
  - briefing
  - plan-b
  timestamp: '2026-06-23T00:00:00+07:00'
  status: reviewed
  visibility: public
  last_verified: '2026-06-23'
  body: '# Overview


    JVTO treats safety as a written framework applied before and during every

    tour rather than a marketing line: pre-hike safety briefings, trained

    guides, proper equipment, and written contingency ("Plan-B") procedures. The

    approach reflects the founder''s background as a serving Tourist Police

    officer.


    # Related Concepts


    - [Police-led operations](/trust/claims/police-led.md)

    - [Ijen Health Screening](/policies/ijen-health-screening.md)

    '
