- id: travel-guides/weather-and-closures
  type: Travel Guide
  title: Weather, Volcanic Activity & Closures
  description: What happens when conditions change — Bromo and Ijen are active volcanoes, and JVTO follows
    authority instructions and activates a Plan-B if access is restricted.
  tags:
  - travel-guide
  - weather
  - closures
  - volcanic-activity
  - plan-b
  timestamp: '2026-06-23T00:00:00+07:00'
  status: reviewed
  visibility: public
  last_verified: '2026-06-23'
  body: '# Overview


    Bromo and Ijen are active volcanoes, and the waterfalls are rain-sensitive

    canyon environments. When volcanic alert levels rise, park authorities may

    restrict or close access, and JVTO follows those instructions without

    exception. If a closure affects a booking, JVTO offers reasonable

    alternatives where feasible — a different viewpoint, adjusted timing, or a

    replacement destination — and where a key part of the itinerary cannot run

    at all, Travel Credit applies to the unused portion under the booking terms.


    The annual Tengger "Kasada" ceremony at Bromo falls on a lunar-calendar date

    that varies each year and can restrict crater access during that window.


    # Related Concepts


    - [Natural Phenomena Are Not Guaranteed](/policies/natural-phenomena.md)

    - [Mount Bromo](/destinations/mount-bromo.md)

    '
  source_refs:
  - source_id: SRC-OPS-FACTS
    repo: sambuko82/llm-wiki
    path: wiki/website/operational-facts.md
    source_class: operational_direct
    captured_at: '2026-05-26'
- id: travel-guides/bromo-vs-ijen
  type: Travel Guide
  title: Mount Bromo vs Kawah Ijen
  description: Which volcano suits you — Bromo is an easier sunrise caldera experience, Ijen is a more
    demanding pre-dawn hike for the blue fire and acidic crater lake.
  tags:
  - travel-guide
  - comparison
  - bromo
  - ijen
  - planning
  timestamp: '2026-06-23T00:00:00+07:00'
  status: reviewed
  visibility: public
  last_verified: '2026-06-23'
  body: '# Overview


    The two signature volcanoes suit different travelers. **Mount Bromo**

    (about 2,329 m) is a sunrise-and-caldera experience with little sustained

    hiking — a 4WD jeep does most of the work. **Kawah Ijen** (about 2,386 m) is

    a strenuous pre-dawn hike rewarded by the "blue fire" and a turquoise acidic

    crater lake. Many travelers do both on a multi-day route.


    # Related Concepts


    - [Mount Bromo](/destinations/mount-bromo.md)

    - [Kawah Ijen](/destinations/kawah-ijen.md)

    '
  source_refs:
  - source_id: SRC-OPS-FACTS
    repo: sambuko82/llm-wiki
    path: wiki/website/operational-facts.md
    source_class: operational_direct
    captured_at: '2026-05-26'
- id: travel-guides/surabaya-vs-bali-starting-point
  type: Travel Guide
  title: Starting from Surabaya vs Bali
  description: Choosing your origin — the destinations are the same volcanoes and waterfalls; the difference
    is logistics, transfer times, and (for Bali) a ferry crossing.
  tags:
  - travel-guide
  - planning
  - surabaya
  - bali
  - logistics
  timestamp: '2026-06-23T00:00:00+07:00'
  status: reviewed
  visibility: public
  last_verified: '2026-06-23'
  body: '# Overview


    JVTO runs private packages from both Surabaya and Bali. The destinations are

    the same East Java volcanoes and waterfalls; what changes is the logistics —

    where you begin, the direction of travel, and the first transfer time. There

    are more routes from Surabaya, while Bali-origin routes add a ferry crossing.

    Choose the origin that fits your flights and timeline.


    # Related Concepts


    - [All tours](/tours/index.md)

    '
  source_refs:
  - source_id: SRC-OPS-FACTS
    repo: sambuko82/llm-wiki
    path: wiki/website/operational-facts.md
    source_class: operational_direct
    captured_at: '2026-05-26'
- id: travel-guides/how-many-days
  type: Travel Guide
  title: How Many Days Do You Need?
  description: Matching trip length to what you want to see — from a single Bromo sunrise to a multi-day
    circuit adding Ijen, waterfalls, and the coast.
  tags:
  - travel-guide
  - planning
  - itinerary
  - duration
  timestamp: '2026-06-23T00:00:00+07:00'
  status: reviewed
  visibility: public
  last_verified: '2026-06-23'
  body: '# Overview


    The right trip length depends on how many destinations you want and where

    you start. Short itineraries focus on a single Bromo sunrise; adding days

    brings in Kawah Ijen, the Tumpak Sewu and Madakaripura waterfalls, and the

    Papuma coast on the longest circuits. See the itinerary guide for what each

    duration covers, day by day.


    # Related Concepts


    - [All tours](/tours/index.md)

    - [Starting from Surabaya vs Bali](/travel-guides/surabaya-vs-bali-starting-point.md)

    '
