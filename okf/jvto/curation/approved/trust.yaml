- id: trust/claims/medical-screening
  type: Trust Claim
  title: Ijen Medical Screening Included
  description: A health certificate is mandatory for every guest before Kawah Ijen crater entry; JVTO
    coordinates the screening with a licensed doctor, included in the tour.
  tags:
  - trust
  - safety
  - medical-screening
  - ijen
  timestamp: '2026-07-07T00:00:00+07:00'
  status: reviewed
  visibility: public
  last_verified: '2026-07-07'
  body: '# Claim


    JVTO states that Ijen night-hike packages include the pre-hike health screening,

    coordinated as part of the tour. A health certificate is mandatory for every

    guest before Kawah Ijen crater entry — the East Java conservation authority

    (BBKSDA) sets this requirement, with Surat Edaran SE.1658/KSA.9/2024 cited as

    the supporting regulatory authority. BBKSDA sets the rule, not JVTO; JVTO

    coordinates the clinic workflow so guests can satisfy it.


    # Related Concepts


    - [Dr. Ahmad Irwandanu](/people/dr-ahmad-irwandanu.md)

    - [Ijen Health Screening](/policies/ijen-health-screening.md)

    - [Kawah Ijen](/destinations/kawah-ijen.md)

    '
  source_refs:
