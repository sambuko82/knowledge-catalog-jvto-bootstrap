- id: trust/credentials/legal-registration
  type: Credential
  title: Legal Registration (NIB)
  description: JVTO operates as PT Java Volcano Rendezvous under Indonesian business number (NIB) 1102230032918,
    publicly verifiable on the OSS portal.
  tags:
  - trust
  - credential
  - legal
  - registration
  - nib
  timestamp: '2026-06-23T00:00:00+07:00'
  status: reviewed
  visibility: public
  last_verified: '2026-06-23'
  body: '# Credential


    JVTO''s operating company is **PT Java Volcano Rendezvous**, registered under

    Indonesian business number **NIB 1102230032918**. The registration is public

    and can be checked on Indonesia''s national OSS business portal.


    JVTO lists its registration and tourism licensing on its public verification

    page, where the identifiers can be cross-checked.


    # Company Registry and Classification


    The operating company is registered with the Indonesian Ministry of Law and

    Human Rights (AHU) as **AHU-0023020**, checkable on the AHU company-search

    portal. Its business activity is classified under KBLI codes **79121** (Travel

    Agency), **79911** (Tour Operator), and **62019** (IT services).


    # Related Concepts


    - [Police-Led Operations](/trust/claims/police-led.md)

    - [Java Volcano Tour Operator (JVTO)](/organization.md)

    '
  citations:
  - https://oss.go.id
  - https://ahu.go.id/pencarian/perseroan
  source_refs:
  - source_id: SRC-LEGAL-LICENSES
    repo: sambuko82/llm-wiki
