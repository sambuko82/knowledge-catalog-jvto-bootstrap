- id: trust/partners/isic
  type: Partner
  title: ISIC (International Student Identity Card)
  description: JVTO is listed as a provider in ISIC's public discount directory (provider ID 259268),
    the basis for its student pricing on selected packages.
  resource: https://www.isic.org/discounts/?providerId=259268
  tags:
  - partner
  - isic
  - student
  - provider-listing
  timestamp: '2026-07-07T00:00:00+07:00'
  status: reviewed
  visibility: public
  last_verified: '2026-07-07'
  relationship_type: provider_listing
  body: '# Relationship


    JVTO is listed as a provider in ISIC''s public discount directory under

    provider ID 259268. JVTO uses ISIC verification (Alive Verify API) to

    confirm student status for its student pricing on selected packages.


    # Claim Boundary


    This concept records a public ISIC provider-directory listing only. It

    does not establish a certification, endorsement, corporate membership, or

    partnership beyond that listing.


    # Source check


    The directory page is a JS-rendered application: a direct automated read

    on 2026-07-07 returned the page shell without rendering the provider

    entry. The listing is anchored on the knowledge-base source-health record

    (provider 259268 recorded live) and retained per source-health policy —

    a JS-only page is a warning record, not an invalidation.


    # Related Concepts


    - [ISIC Student Pricing](/policies/isic-student.md)

    - [Java Volcano Tour Operator (JVTO)](/organization.md)

    '
  citations:
