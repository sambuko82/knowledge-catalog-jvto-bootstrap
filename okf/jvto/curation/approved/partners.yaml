  body: |
    # Relationship

    JVTO is a listed supplier on the GetYourGuide online marketplace under supplier ID
    `s260697`, a public distribution channel where travelers can book selected JVTO
    activities. This is recorded in JVTO's own canonical supplier listing.

    # Claim Boundary

    This concept records a public marketplace listing / distribution channel only. It does
    not establish an exclusive partnership or endorsement, nor that every JVTO package is
    sold there. Commercial terms (commission, pricing) are not published here.

    # Source check

    A direct automated read on 2026-06-26 returned HTTP 403 (GetYourGuide bot protection);
    the listing identity is confirmed via JVTO's canonical supplier record and the
    self-identifying listing URL, and the last basis is retained per the dynamic-source rule.

    # Related Concepts

