    body: |
      # Relationship

      JVTO identifies Dr. Ahmad Irwandanu as the doctor associated with its applicable
      Ijen pre-hike health-screening coordination. JVTO states that Ijen night-hike
      packages include a pre-hike health screening as part of the route logistics.

      # Claim Boundary

      This concept records an operating relationship for applicable Ijen screening
      coordination only.
      It does not confirm current medical-license validity, expiry date, private-practice
      details, or a universal screening requirement. Whether screening is required or
      verified before crater access depends on current local authority or provider rules.

      # Related Concepts

      - [Ijen Medical Screening Included](/trust/claims/medical-screening.md)
      - [Ijen Health Screening](/policies/ijen-health-screening.md)
