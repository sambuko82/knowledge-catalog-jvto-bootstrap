    Indonesia Ecotourism Network. JVTO presents this listing as supporting its

    community-based tourism and local-employment practices.


    # Claim Boundary


    This concept records a public INDECON network feature only.

    It does not establish certification, audit approval, exclusive partnership, or

    a guarantee of all JVTO practices.


