# Verified-curation records for Partner concepts.
# Wording is deliberately hedged: a governing authority is not a "commercial partner",
# and self-reported memberships stay first-party until independently confirmed.
records:
  - id: trust/partners/bbksda-jatim
    type: Partner
    title: BBKSDA Jawa Timur (Ijen Conservation Authority)
    description: The East Java conservation authority that governs Kawah Ijen access, ticketing, and guide standards; JVTO operates its Ijen tours under its rules.
    resource: https://bbksdajatim.org
    tags: [partner, authority, conservation, ijen, bbksda]
    timestamp: "2026-06-25T00:00:00+07:00"
    status: reviewed
    visibility: public
    last_verified: "2026-06-25"
    body: |
      # Overview

      Balai Besar KSDA Jawa Timur (BBKSDA Jawa Timur) is the East Java conservation
      authority that manages the Kawah Ijen nature-tourism area, including its
      official online "Ijen Blue Fire" e-ticketing and cashless (QRIS) system and
      guide-training programmes.

      # Relationship to JVTO

      As with any operator working in the area, JVTO's Ijen tours are subject to
      BBKSDA Jawa Timur's access, ticketing, and visitor rules. BBKSDA is the
      governing conservation authority for Ijen, not a commercial partner of JVTO.
      JVTO states on its own website that it holds "BBKSDA operator clearance" for
      Bromo and Ijen; that specific clearance is a first-party claim and is not
      independently listed on BBKSDA's public site.

      # Related Concepts

      - [Kawah Ijen](/destinations/kawah-ijen.md)
      - [Ijen health screening](/policies/ijen-health-screening.md)
