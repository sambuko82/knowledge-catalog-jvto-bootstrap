records:
- id: policies/cancellation-travel-credit
  type: Policy
  title: Cancellation & Lifetime Travel Credit
  description: How JVTO handles guest-initiated cancellations — Travel Credit instead of cash refunds,
    on a 48-hour cut-off.
  tags:
  - policy
  - cancellation
  - travel-credit
  - booking
  timestamp: '2026-06-23T00:00:00+07:00'
  status: reviewed
  visibility: public
  last_verified: '2026-06-23'
  body: "# Overview\n\nFor guest-initiated cancellations JVTO uses Travel Credit rather than cash\nrefunds.\
    \ The binding terms are in the published Booking, Payment &\nCancellation policy; this is a summary\
    \ — see that page for exact details.\n\n# The Rule\n\n- **48 hours or more before Day 1:** payments\
    \ already made are not refunded\n  in cash, but 100% of what you have paid converts to JVTO Lifetime\
    \ Travel\n  Credit (no expiry, transferable). One free reschedule may also be\n  requested in this\
    \ window.\n- **Less than 48 hours before Day 1:** the booking may be forfeited up to\n  100%, and\
    \ Travel Credit or cash refunds are generally not provided.\n\nCash refunds are not available for\
    \ guest-initiated cancellations. Travel\nCredit can be applied to any JVTO package on a future date.\
    \ Bookings\nnormally start with a 20% deposit.\n\n# Related Concepts\n\n- [3D2N Ijen, Bromo & Madakaripura\
    \ tour](/tours/from-surabaya/ijen-bromo-madakaripura-3d2n.md)\n"
  source_refs:
  - source_id: SRC-POLICY-PACK
    repo: sambuko82/llm-wiki
    path: wiki/sources/jvto-policy-pack-v6.md
    source_class: operational_direct
    captured_at: '2026-05-26'
- id: policies/booking-paths
  type: Policy
  title: How to Book
  description: JVTO's two official booking paths — website Instant Book and WhatsApp-assisted booking.
  tags:
  - policy
  - booking
  - whatsapp
  - instant-book
  timestamp: '2026-06-23T00:00:00+07:00'
  status: reviewed
  visibility: public
  last_verified: '2026-06-23'
  body: "# Overview\n\nJVTO offers two official ways to book:\n\n- **Website Instant Book** — choose a\
    \ package, date, and number of travelers,\n  review the price, accept the terms, and pay.\n- **WhatsApp-assisted\
    \ booking** — for custom routes or special requests; JVTO\n  confirms availability and price and sends\
    \ a payment link.\n\nBook only through JVTO's official channels.\n\n# Related Concepts\n\n- [All tours](/tours/index.md)\n"
  source_refs:
  - source_id: SRC-POLICY-PACK
    repo: sambuko82/llm-wiki
    path: wiki/sources/jvto-policy-pack-v6.md
    source_class: operational_direct
