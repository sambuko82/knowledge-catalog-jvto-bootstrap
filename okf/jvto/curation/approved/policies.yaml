- id: policies/natural-phenomena
  type: Policy
  title: Natural Phenomena Are Not Guaranteed
  description: JVTO cannot guarantee weather-dependent sights such as sunrise or Ijen's blue fire; itineraries
    are planned to maximise the chance.
  tags:
  - policy
  - weather
  - expectations
  - blue-fire
  - sunrise
  timestamp: '2026-06-23T00:00:00+07:00'
  status: reviewed
  visibility: public
  last_verified: '2026-06-23'
  body: '# Overview


    Weather-dependent sights — a clear sunrise, or Ijen''s blue fire — cannot be

    guaranteed, because cloud, weather, and volcanic gas are outside any

    operator''s control. JVTO plans timing and routes to maximise the chance of

    good conditions, and may adjust timing or routing for safety.


    # Related Concepts


    - [Kawah Ijen](/destinations/kawah-ijen.md)

    '
  source_refs:
  - source_id: SRC-POLICY-PACK
    repo: sambuko82/llm-wiki
    path: wiki/sources/jvto-policy-pack-v6.md
    source_class: operational_direct
    captured_at: '2026-05-26'
