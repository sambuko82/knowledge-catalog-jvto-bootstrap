- id: policies/payment-rules
  type: Policy
  title: Payment & Deposit
  description: A deposit secures the booking, with the balance due before the tour; exact amounts and
    deadlines are on the booking page.
  tags:
  - policy
  - payment
  - deposit
  - booking
  timestamp: '2026-06-23T00:00:00+07:00'
  status: reviewed
  visibility: public
  last_verified: '2026-06-23'
  body: '# Overview


    A deposit (standard 20% of the booking value) secures a booking, with the

    balance due before the tour starts; close-to-departure bookings may require

    fuller payment. Exact amounts, accepted methods, and deadlines are shown at

    checkout and on the booking information page.


    Pay only through JVTO''s official payment links and listed accounts.


    # Related Concepts


    - [Cancellation & Lifetime Travel Credit](/policies/cancellation-travel-credit.md)

    '
  source_refs:
  - source_id: SRC-POLICY-PACK
    repo: sambuko82/llm-wiki
