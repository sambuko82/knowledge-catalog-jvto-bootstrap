- id: destinations/mount-bromo
  type: Destination
  title: Mount Bromo
  description: Active East Java volcano in the Tengger caldera "Sea of Sand", famous for its pre-dawn
    sunrise panorama reached by 4WD jeep.
  tags:
  - destination
  - east-java
  - volcano
  - bromo
  - sunrise
  timestamp: '2026-07-07T00:00:00+07:00'
  status: reviewed
  visibility: public
  last_verified: '2026-07-07'
  activity:
    typical_schedule: Pre-dawn departure (around 03:00) by 4WD jeep for the sunrise viewpoint, then
      a crossing of the sand sea and a short ascent to the crater rim; finish mid-morning.
    effort: moderate
    access_requirements:
    - TNBTS (Bromo Tengger Semeru National Park) ticket
    - 4WD jeep for the sand sea
  body: "# Overview\n\nMount Bromo (summit roughly 2,329 m) sits inside the Tengger caldera in East\n\
    Java, surrounded by a vast volcanic plain known as the \"Sea of Sand\". It is\nbest known for the\
    \ pre-dawn sunrise panorama over the caldera from elevated\nviewpoints, followed by a crossing of\
    \ the sand sea to the smoking crater.\n\n# Visiting\n\n- A typical visit departs around 03:00 for\
    \ sunrise; a 4WD jeep crosses the\n  sand sea, then a short walk (or optional horse ride) reaches\
    \ the crater rim.\n- The area is managed by the national-park / BBKSDA authority.\n- Volcanic activity\
    \ can occasionally restrict crater access; check the current\n  status before travel.\n\n# Fees &\
    \ Tickets\n\n- Entrance fees, park permits, and the private 4WD jeep are included in JVTO\n  tours —\
    \ guests do not pay them separately.\n- Park tickets are booked online in advance via the official\n\
    \  national-park portal (bookingbromo.bromotenggersemeru.org); JVTO handles\n  the ticketing.\n\n# Related\
    \ Concepts\n\n- [All tours](/tours/index.md)\n"
  citations:
  - https://bbksdajatim.org
  - https://bromotenggersemeru.org
  source_refs:
  - source_id: SRC-DEST
    repo: sambuko82/llm-wiki
