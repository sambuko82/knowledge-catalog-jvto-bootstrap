    last_verified: "2026-06-23"
    body: |
      # Overview

      Madakaripura is Java's tallest waterfall, set in a narrow canyon in
      Probolinggo Regency, East Java (a main drop of roughly 100 m). It is linked
      historically to Gajah Mada, the 14th-century Majapahit prime minister, and
      its proximity to Bromo makes it a natural same-day pairing.

      # Visiting

      - Reached by a gorge walk of roughly 1.5 km over wet, slippery ground;
        visitors get wet from the spray, so a raincoat is recommended.
      - JVTO guides accompany guests through the canyon; helmets at the entrance are
        provided by the local site management, not by JVTO.

