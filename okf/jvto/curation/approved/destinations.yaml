    body: |
      # Overview

      Mount Bromo (summit roughly 2,329 m) sits inside the Tengger caldera in East
      Java, surrounded by a vast volcanic plain known as the "Sea of Sand". It is
      best known for the pre-dawn sunrise panorama over the caldera from elevated
      viewpoints, followed by a crossing of the sand sea to the smoking crater.

      # Visiting

      - A typical visit departs around 03:00 for sunrise; a 4WD jeep crosses the
        sand sea, then a short walk (or optional horse ride) reaches the crater rim.
      - The area is managed by the national-park / BBKSDA authority.
      - Volcanic activity can occasionally restrict crater access; check the current
        status before travel.

