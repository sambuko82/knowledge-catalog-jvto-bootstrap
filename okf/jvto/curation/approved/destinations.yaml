    description: Active East Java volcano in the Tengger caldera "Sea of Sand", famous for its pre-dawn sunrise panorama reached by 4WD jeep.
    resource: https://javavolcano-touroperator.com/destinations/mount-bromo
    tags: [destination, east-java, volcano, bromo, sunrise]
    timestamp: "2026-06-23T00:00:00+07:00"
