    title: Madakaripura Waterfall
    description: Java's tallest waterfall, in a narrow Probolinggo canyon near Bromo, reached by a short gorge walk where visitors get wet from the spray.
    resource: https://javavolcano-touroperator.com/destinations/madakaripura-waterfall
    tags: [destination, east-java, waterfall, madakaripura]
    timestamp: "2026-06-23T00:00:00+07:00"
    status: verified
    visibility: public
    last_verified: "2026-06-25"
    body: |
      # Overview

      Madakaripura is, per the Probolinggo Regency tourism office, the tallest
      waterfall on the island of Java (and second tallest in Indonesia), set in a
      narrow canyon in Probolinggo Regency, East Java, with a main drop of roughly
      200 m. It is linked historically to Gajah Mada, the 14th-century Majapahit
      prime minister, and its proximity to Bromo makes it a natural same-day pairing.

      # Visiting

      - Reached by a gorge walk of roughly 1.5 km over wet, slippery ground;
        visitors get wet from the spray, so a raincoat is recommended.
      - JVTO guides accompany guests through the canyon; helmets at the entrance are
        provided by the local site management, not by JVTO.

