    type: Destination
    title: Kawah Ijen
    description: Active East Java volcano known for its turquoise acidic crater lake, pre-dawn "blue fire", and active sulfur mining, reached by a guided night hike.
    resource: https://javavolcano-touroperator.com/destinations/ijen-crater
    tags: [destination, east-java, volcano, ijen, hiking, blue-fire]
    timestamp: "2026-06-23T00:00:00+07:00"
    status: qualified
    visibility: public
    last_verified: "2026-06-25"
    body: |
      # Overview

      Kawah Ijen is an active volcano on the Banyuwangi–Bondowoso border of East
      Java, Indonesia. Its crater rim — the viewpoint reached on the night hike —
      sits at roughly 2,386 m, while the wider Ijen volcanic complex summit is
      higher (about 2,769–2,799 m, depending on the source); the rim figure is
      sometimes mislabelled as the summit. The crater holds one of the world's
      largest highly acidic lakes, and the same vents produce the "blue fire" —
      burning sulfuric gas visible before dawn under suitable conditions (not
      guaranteed). An active sulfur-mining operation works inside the crater. The
      volcano is intermittently active and access can be restricted when the
      official alert level rises.

      # Visiting

      - Reached on foot from the Paltuding trailhead — roughly 3 km one way, about
        90 minutes up a steep trail, typically started around midnight or pre-dawn.
      - Access is managed by the East Java conservation authority (BBKSDA). When
        their regulations are in effect, crater access can require a short health
        screening and certificate.
      - On JVTO tours, gas masks and trekking poles are provided as standard.

      # Related Concepts

