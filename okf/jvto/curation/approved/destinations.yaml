- id: destinations/tumpak-sewu
  type: Destination
  title: Tumpak Sewu Waterfall
  description: A wide multi-tiered "curtain" waterfall in Lumajang, East Java, often called "Java's Niagara",
    with an easy rim viewpoint and an optional steep canyon descent.
  tags:
  - destination
  - east-java
  - waterfall
  - tumpak-sewu
  timestamp: '2026-06-23T00:00:00+07:00'
  status: reviewed
  visibility: public
  last_verified: '2026-06-26'
  activity:
    typical_schedule: Morning visit; an easy rim viewpoint, then an optional steep canyon descent;
      finish around midday.
    effort: hard
    access_requirements:
    - local guide
    - optional steep canyon descent with ropes (the guide assesses fitness; the descent decision
      stays with the guest)
  body: "# Overview\n\nTumpak Sewu is a wide, multi-tiered \"curtain\" waterfall (roughly 120 m high)\n\
    in Lumajang Regency, East Java, sometimes called \"Java's Niagara\" for the\nmany streams falling\
    \ across a curved cliff into a canyon.\n\n# Visiting\n\n- A rim viewpoint is reached by a short, easy\
    \ walk from parking.\n- An optional descent into the canyon is steep (about 300 steps, with ropes\n\
    \  in places) over wet, slippery terrain; guides assess fitness and brief the\n  route before starting,\
    \ and the decision to descend stays with the guest.\n- Helmets for the canyon section are provided\
    \ by the local site management,\n  not by JVTO.\n\n# Related Concepts\n\n- [All tours](/tours/index.md)\n"
  source_refs:
  - source_id: SRC-DEST
    repo: sambuko82/llm-wiki
    path: wiki/destinations/tumpak-sewu.md
    source_class: operational_direct
    captured_at: '2026-05-26'
- id: destinations/madakaripura
  type: Destination
  title: Madakaripura Waterfall
  description: Java's tallest waterfall, in a narrow Probolinggo canyon near Bromo, reached by a short
    gorge walk where visitors get wet from the spray.
  tags:
  - destination
  - east-java
  - waterfall
  - madakaripura
  timestamp: '2026-07-07T00:00:00+07:00'
  status: reviewed
  visibility: public
  last_verified: '2026-06-26'
  activity:
    typical_schedule: Late-morning visit, often paired same-day with Bromo; a roughly 1.5 km gorge
      walk to the falls.
    effort: moderate
    access_requirements:
    - local guide
    - raincoat recommended (spray on the gorge walk)
  body: "# Overview\n\nMadakaripura is Java's tallest waterfall, set in a narrow canyon in\nProbolinggo\
    \ Regency, East Java (a main drop of roughly 100 m). It is linked\nhistorically to Gajah Mada, the\
    \ 14th-century Majapahit prime minister, and\nits proximity to Bromo makes it a natural same-day pairing.\n\
    \n# Visiting\n\n- Reached by a gorge walk of roughly 1.5 km over wet, slippery ground;\n  visitors\
    \ get wet from the spray, so a raincoat is recommended.\n- JVTO guides accompany guests through the\
    \ canyon; helmets at the entrance are\n  provided by the local site management, not by JVTO.\n- The\
    \ narrow canyon is rain-sensitive: heavy rain can trigger flash floods\n  and landslides, and site\
    \ management closes access during high water. Visits\n  are scheduled to be out of the canyon before\
    \ typical afternoon rains,\n  which is one reason the stop is paired with Bromo earlier in the day.\n\
    \n#\
    \ Related Concepts\n\n- [All tours](/tours/index.md)\n"
  source_refs:
  - source_id: SRC-DEST
    repo: sambuko82/llm-wiki
    path: wiki/destinations/madakaripura.md
    source_class: operational_direct
    captured_at: '2026-05-26'
- id: destinations/papuma-beach
  type: Destination
  title: Papuma Beach
  description: A white-sand beach with offshore rock formations and a headland viewpoint in Jember, East
    Java — the one coastal stop on JVTO's volcano circuits.
  tags:
  - destination
  - east-java
  - beach
  - papuma
  timestamp: '2026-06-23T00:00:00+07:00'
  status: reviewed
  visibility: public
  last_verified: '2026-06-26'
  activity:
    typical_schedule: Flexible daytime stop; a short headland walk for the viewpoints, used as a
      change of pace between volcano and waterfall days.
    effort: easy
    access_requirements:
    - none (no permits or health screening required)
  body: "# Overview\n\nPapuma Beach (Tanjung Papuma) is a white-sand beach with dramatic offshore\nrock\
    \ formations and a rocky cape headland in Jember Regency, East Java. It is\nthe only coastal destination\
    \ on JVTO's circuits, used as a change of pace\nbetween volcano and waterfall days on longer itineraries.\n\
    \n# Visiting\n\n- A short, easy walk up the headland gives elevated views over the rocks and\n  coastline;\
    \ no special permits or health screening are required.\n- Conditions are calmest in the dry season.\n\
    \n# Related Concepts\n\n- [All tours](/tours/index.md)\n"
  source_refs:
  - source_id: SRC-DEST
