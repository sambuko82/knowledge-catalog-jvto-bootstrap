version: 1
bundle:
  id: jvto
  visibility: public
  okf_version: "0.1"
  # Every concept must carry these fields (validate_okf.py JVTO-06).
  required_fields: [type, title, description, tags, timestamp, id, status]
  # The full lifecycle vocabulary (validate_okf.py JVTO-07 rejects anything else).
  known_statuses:
    - draft                      # manually started, not releasable
    - generated_pending_review   # script-generated candidate, not releasable
    - needs_review               # stale/conflicting/unsupported, not releasable
    - reviewed                   # human-verified against citations
    - verified                   # verified-curation skill: all material claims verified
    - qualified                  # verified-curation skill: included with narrower wording
    - published                  # reviewed and intentionally released
    - deprecated                 # retained history, not active
  # Only these statuses may appear in a release (validate_okf.py --release JVTO-03).
  allowed_statuses_for_release: [reviewed, verified, qualified, published]

source_rules:
  package_readiness:
    require_clean_manifest: true
    require_schema_prefix: package-readiness/v1
    output_status: generated_pending_review
  policy_bundle:
    require_clean_manifest: true
    require_schema_prefix: policy-bundle/v1
    output_status: generated_pending_review
  trust_bundle: {auto_publish: false}
  itinerary_core: {auto_publish: false}

forbidden_public_terms:
  - raw customer
  - customer email
  - customer phone
  - passport number
  - payment reference
  - vendor rate
  - crew rate
  - profit margin
  - api key
  - private key

required_citation_types:
  - Organization
  - Destination
  - Tour Package
  - Travel Guide
  - Policy
  - Trust Claim
  - Credential
  - Review Platform
  # Not yet used in the bundle, but guardrailed up front: any future Partner or
  # Reference concept must cite a public URL (validate_okf.py JVTO-04).
  - Partner
  - Reference

# ---------------------------------------------------------------------------
# R3 canonical-source-extraction config (validate_okf.py JVTO-11 .. JVTO-16).
# ---------------------------------------------------------------------------

# `Person` (founder, doctor, crew) is the only new concept type. It anchors on source
# provenance (`source_refs`), not a public-URL citation, so it is NOT in
# required_citation_types — it is governed by source_ref_required_types below.
known_concept_types:
  - Organization
  - Destination
  - Tour Package
  - Travel Guide
  - Policy
  - Trust Claim
  - Credential
  - Partner
  - Reference
  - Review Platform
  - Person

# Concept types that must carry a non-empty `source_refs` provenance list (JVTO-12).
source_ref_required_types:
  - Person

# Frontmatter keys whose presence on ANY concept also requires `source_refs` (JVTO-12),
# regardless of type — dynamic observations, embedded operations, and commercial signals.
source_ref_required_fields:
  - observations
  - operational
  - commercial_context

# JVTO-11: review counts the knowledge SSOT has retired as stale. A concept that places
# one of these counts within ~40 characters of its platform name is rejected, so a
# known-stale figure (e.g. one still shown on the live website) can never re-enter the
# bundle. (Salvaged from the closed audit PR; current canonical counts live upstream.)
stale_review_claims:
  - {platform: google, count: 92}      # superseded by the API-verified canonical (123)
  - {platform: trustpilot, count: 47}  # superseded by the current canonical (51/56)

# JVTO-18 (authority hierarchy): the JVTO website is a SECONDARY presentation and corroboration
# layer, never the final authority. It may appear as supplementary context (a `resource` or an
# extra citation), but it may NOT be the sole evidence for a material claim: a concept that cites
# the website must also carry a `source_refs` anchor (llm-wiki / itinerary-core) or a non-website
# external primary URL. Matched by URL host, so an external URL whose path merely contains the
# brand (e.g. a Trustpilot review URL) is NOT secondary.
# Governance (not machine-checked): website absence, mismatch, or staleness must never trigger
# deletion, downgrade, or invalidation of a fact that is already supported upstream — record such a
# gap as a publication propagation recommendation instead.
secondary_presentation_domains:
  - javavolcano-touroperator.com

# ---------------------------------------------------------------------------
# JVTO-20: claim-boundary denylist (validate_okf.py).
# Ported from llm-wiki scripts/claim_boundaries.yml — the content-side linter that
# self-describes as the analog of this repo's boundary checks. It machine-enforces
# the root CLAUDE.md Partner/Reference claim boundaries.
#
# An affirmative regex match on an ACTIVE paragraph fails the concept. A paragraph
# containing one of the context markers below is a note ABOUT a superseded or
# unsupported value (e.g. a "# Claim Boundary" section stating what the evidence
# does NOT support), not an active assertion, and is skipped. Patterns are Python
# `re`, matched against whitespace-flattened paragraphs so wrapped prose cannot
# dodge a pattern.
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# JVTO-21: freshness SLA (validate_okf.py, WARNINGS ONLY — never errors, and no
# effect on --release exit codes; external staleness must not auto-invalidate a
# concept). Ported from llm-wiki's F1 compiler rule (last_verified vs
# stale_after_days). A verified/qualified concept whose last verification date
# is older than its type's SLA is surfaced in build/validation-report.json as a
# machine-generated worklist for the separate source-health review.
# ---------------------------------------------------------------------------

freshness:
  stale_after_days:
    Review Platform: 90      # ratings/counts drift fastest
    Trust Claim: 180
    Policy: 180
    Credential: 180
    Partner: 180
    Organization: 365
    Destination: 365
    Travel Guide: 365        # fee tariffs and access rules change on ~annual decree cycles
    Tour Package: 365
    Person: 365
    Reference: 730           # historical artifacts decay slowest

claim_boundary_context_markers:
  - supersed
  - do not publish
  - do not use
  - no longer
  - not asserted
  - does not support
  - does not confirm
  - does not establish
  - not evidence
  - is never

claim_boundaries:
  - id: STEFAN-EDITION
    # Only the DROPPED metadata: the dropped ISBN-13 (978-3-7701-7881-0) and the canonical
    # (978-3-770-16765-4) share the "9783770" prefix, so match the unique "7701-7881" segment.
    pattern: '(?i)stefan.{0,80}?(4th edition|2016 edition|\b2018\b|dumont|7701[- ]?7881|9783770178810)'
    message: Stefan Loose year/edition/publisher asserted — historical guidebook reference only (llm-wiki DEC-001).
  - id: BOOKING-CONTINUITY
    pattern: '(?i)(same address where jvto operates|confirming operational continuity|demonstrating continuous operational presence|address[- ]continuity evidence|''a'' suffix was added after|suffix was added after the pt)'
    message: Booking.com 2015 framed as address continuity / legal succession — historical award artifact only.
  - id: DETIK-IJEN
    pattern: '(?i)detik.{0,45}?(at ijen|kawah ijen|patrolling the ijen|duties at ijen|officer at ijen)'
    message: Detik press attributed to Kawah-Ijen-specific duty — Detik evidences general Bondowoso duty only.
  - id: BBKSDA-CERTIFIED
    pattern: '(?i)bbksda[- ]?certified'
    message: Over-claim 'BBKSDA certified' — BBKSDA supervises HPWKI guide training; it does not certify JVTO.
  - id: ISIC-PARTNER
    pattern: '(?i)isic.{0,40}?(official provider listing|as a partner|is a partner)'
    message: ISIC asserted as partner / official provider listing without direct provider evidence.
  - id: MEDICAL-CONDITIONAL
    # Regression guard for the 2026-07-06 adjudication (mirrors jvto-web's
    # validate-content-drift.mjs): Ijen health screening is mandatory for every guest,
    # with BBKSDA SE.1658/KSA.9/2024 as supporting authority — never threshold-conditional.
    pattern: '(?i)(?:health[- ]?(?:screening|certificate|check)|\bscreening\b)[^.!?]{0,80}?\b(?:when|where|if|depending on)\b[^.!?]{0,60}?\b(?:requires?|regulations?|rules|in effect)\b|\b(?:when|where|if)\b[^.!?]{0,60}?\b(?:bbksda|conservation[- ]authority|access rules)\b[^.!?]{0,60}?require[^.!?]{0,80}?(?:screening|health[- ]?certificate)|(?:crater access|access rules) can require|\b(?:may|can) require\b[^.!?]{0,60}?(?:screening|health[- ]?certificate)'
    message: Ijen health screening framed as conditional — it is mandatory for every guest (adjudicated 2026-07-06; BBKSDA SE.1658/KSA.9/2024 is supporting authority, not a trigger).
